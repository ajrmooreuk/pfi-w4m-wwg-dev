name: Guard PFC-Core

# Blocks PRs that modify pfc-core/ unless authored by the PFC release bot.
# pfc-core/ is the sealed distribution path — only pfc-release.yml (via
# github-actions[bot]) may write to it. PFI teams can read and execute
# sealed skills but cannot modify them.
#
# Also blocks PFC-prefixed documents in PFI repos — PFI teams must use
# their own instance tier prefix (PFI-BAIV-, PFI-WWG-, etc.).

on:
  pull_request:
    paths:
      - 'pfc-core/**'

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR author
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          # Allow the GitHub Actions bot (used by pfc-release.yml)
          if [[ "$PR_AUTHOR" == "github-actions[bot]" ]]; then
            echo "✅ PR authored by github-actions[bot] — allowed"
            exit 0
          fi

          # Allow PRs labelled pfc-core-release (created by pfc-release.yml)
          if echo "$PR_LABELS" | grep -q "pfc-core-release"; then
            echo "✅ PR has pfc-core-release label — allowed"
            exit 0
          fi

          # Block all other authors
          echo "::error::❌ pfc-core/ is sealed. Only the PFC release pipeline (github-actions[bot]) can modify files in pfc-core/."
          echo ""
          echo "pfc-core/ contains sealed artifacts distributed from the PFC-Core hub (Azlan-EA-AAA)."
          echo "Any manual changes will be overwritten on the next PFC release."
          echo ""
          echo "If you need to modify a sealed skill, submit a PR to the hub repository:"
          echo "  https://github.com/ajrmooreuk/Azlan-EA-AAA"
          exit 1

  guard-pfc-docs:
    runs-on: ubuntu-latest
    # Only runs in PFI repos — hub and convention repos skip this job
    if: startsWith(github.repository, 'ajrmooreuk/pfi-')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block PFC-prefixed docs in PFI repos
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}

          # Find new .md files with PFC- prefix (added in this PR)
          BLOCKED=$(git diff --name-only --diff-filter=A "$BASE_SHA" "$HEAD_SHA" -- '*.md' \
            | xargs -I{} basename {} \
            | grep -E '^PFC-' || true)

          if [[ -n "$BLOCKED" ]]; then
            echo "::error::❌ PFC-prefixed documents are not allowed in PFI repos."
            echo ""
            echo "The following new files use the PFC- tier prefix:"
            echo "$BLOCKED" | while read -r f; do echo "  - $f"; done
            echo ""
            echo "PFI repos must use their instance tier prefix (e.g. PFI-BAIV-, PFI-WWG-, PFI-AIRL-)."
            echo "PFC- documents belong in the hub repository (Azlan-EA-AAA)."
            echo ""
            echo "Reference: PFC-PBS-STD-Document-Controls-Naming-Convention-v1.0.0.md"
            exit 1
          fi

          echo "✅ No PFC-prefixed documents found — OK"
